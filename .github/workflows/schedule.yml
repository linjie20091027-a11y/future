name: NewsPusher 定时推送

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 检查配置
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
        run: |
          if [ -z "$SENDER_EMAIL" ] || [ -z "$SMTP_AUTH_CODE" ]; then
            echo "::error::请先配置 GitHub Secrets: SENDER_EMAIL / SMTP_AUTH_CODE"
            echo "::notice::设置入口: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "配置检查通过"

      - name: 抓取并推送
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          PUSH_INTERVAL_HOURS: ${{ secrets.PUSH_INTERVAL_HOURS }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python main.py
